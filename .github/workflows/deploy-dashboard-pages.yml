name: deploy dashboard pages

on:
  push:
    branches: [main]
    paths:
      - "results/figures/full_interactive_dashboard/**"
      - ".github/workflows/deploy-dashboard-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Publish dashboard to gh-pages
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/dashboard-pages
          mkdir -p /tmp/dashboard-pages
          cp -R results/figures/full_interactive_dashboard/. /tmp/dashboard-pages/
          touch /tmp/dashboard-pages/.nojekyll

          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git switch --force-create gh-pages origin/gh-pages
          else
            git switch --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R /tmp/dashboard-pages/. .

          git add .
          git commit -m "Deploy dashboard site" || exit 0
          git push origin gh-pages
