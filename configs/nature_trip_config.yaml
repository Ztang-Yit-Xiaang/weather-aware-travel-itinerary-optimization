trip:
  scenario: california_statewide_nature
  scenario_city_universe: auto
  start_city_options: [San Francisco]
  end_city_options: [Los Angeles]
  traveler_profile: balanced
  interest_profile: nature_heavy

interest:
  enabled: true
  mode: nature_heavy
  use_balance_objective: false
  preview_top_n: 12
  export_profiles: [nature_heavy, balanced_interest, city_heavy]
  preview_saved_profile_match_threshold: 0.12

hotels:
  use_curated_fallback: true
  hide_placeholder_hotels: true

nature:
  enabled: true
  use_nps_api: false
  use_curated_nature_fallback: true
  min_selected_nature_stops_for_nature_heavy: 2
  required_selected_anchors_for_nature_heavy: [Yosemite, Sequoia]
  preferred_statewide_route_shape: sierra_national_parks
  anchor_inclusion_policy: require_if_feasible_else_explain
  la_inclusion_policy: gateway_or_selected_or_explain

nature_detail_routes:
  enabled: true
  use_osm: true
  use_nps_metadata: true
  use_curated_fallback: true
  route_types: [scenic_drive, short_hike, viewpoint_walk]
  site_scope: all_nature_candidates
  max_routes_per_site: 3
  overpass_radius_meters: 25000
  max_short_hike_km: 12
  max_scenic_drive_km: 90
  soft_score_weight: 0.06

map:
  require_matching_artifact_metadata: true

map_dashboard:
  export_modes: [customer, research]
  default_mode: research
  customer_day_options: auto
  customer_hide_research_controls: true
  customer_allow_preference_export: true

transport:
  airport_gateways:
    San Francisco:
      code: SFO
      name: San Francisco International Airport
      latitude: 37.6213
      longitude: -122.3790
    Los Angeles:
      code: LAX
      name: Los Angeles International Airport
      latitude: 33.9416
      longitude: -118.4085

bandit:
  arms:
    - scenic_social
    - fastest_low_cost
    - balanced
    - high_must_go
    - low_detour
    - nature_heavy
    - scenic_parks
    - national_park_priority
    - city_nature_balanced
    - weather_safe_indoor_backup
